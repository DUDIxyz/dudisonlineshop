<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DudisAdventure</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>

    #ig-arrow {
  display: none;
  position: fixed;
  top: 6px;
  right: 6px;

  width: 110px;
  height: 110px;

  pointer-events: none;
  z-index: 9999;

  /* leichter Winkel für organischen Look */
  transform: rotate(+45deg);

  animation: pulse 1.8s ease-in-out infinite;
}

/* Arrow Style */
#ig-arrow path {
  stroke: #0a0a0a;
  stroke-width: 2.4;
  fill: none;
  stroke-linecap: round;
}

#ig-arrow polygon {
  fill: #0a0a0a;
}

/* Text Style */
#ig-arrow text {
  font-size: 10px;
  fill: #111;
  font-family: 'Inter', sans-serif;

  /* leicht schräg für diesen "handcrafted" vibe */
  transform: rotate(+8deg);
  transform-origin: left;
}

/* Subtle heartbeat */
@keyframes pulse {
  0%   { transform: rotate(+8deg) scale(1); opacity: 1; }
  50%  { transform: rotate(+8deg) scale(1.06); opacity: 1; }
  100% { transform: rotate(+8deg) scale(1); opacity: 1; }
}

    body {
      background: #f7f9fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #111;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      text-align: center;
    }

    .profile {
      margin-bottom: 40px;
    }

    .profile img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 2px solid #e5e7eb;
    }

    .profile h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .profile p {
      font-size: 14px;
      color: #666;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: block;
      padding: 16px;
      border-radius: 12px;
      background: white;
      text-decoration: none;
      color: #111;
      font-weight: 500;
      border: 1px solid #e5e7eb;

      /* Animation */
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .link-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(34, 197, 94, 0.08); /* hellgrün */
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .link-btn:hover {
      transform: translateY(-3px);
      border-color: #22c55e;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .link-btn:hover::after {
      opacity: 1;
    }

    .link-btn:active {
      transform: scale(0.97);
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

 <svg id="ig-arrow" viewBox="0 0 120 140">

<svg width="120" height="120">
  <!-- Pfeilspitze definieren -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <!-- Kürzere, steilere Linie -->
  <line x1="40" y1="100" x2="80" y2="40" stroke="black" stroke-width="2" marker-end="url(#arrowhead)" />
</svg>

  <!-- text -->
  <text x="25" y="110">Open in browser</text>

  </svg>

  <div class="container">

    <div class="profile">
      <img src="https://via.placeholder.com/100" alt="Profile">
      <h1>DudisAdventure</h1>
      <p>Travel • Fitness • Adventure</p>
    </div>

    <div class="links">
      <a href="https://protonvpn.com/l/special-partner-offer-new" class="link-btn">70% off Proton VPN</a>
      <a href="https://www.youtube.com/@DudisAdventure" class="link-btn">YouTube</a>
      <a href="https://www.instagram.com/dudisadventuree/" class="link-btn">Instagram</a>
      <a href="https://www.tiktok.com/@dudis_adventure" class="link-btn">TikTok</a>
      <a href="mailto:davideliasmedia@proton.me" class="link-btn">Contact for Cooperations</a>

    </div>

    <footer>
      © 2026 DudisAdventure
    </footer>

  </div>

  <script>
  function isInstagram() {
    return navigator.userAgent.toLowerCase().includes("instagram");
  }

  if (isInstagram()) {
    document.getElementById("ig-arrow").style.display = "block";
  }
  </script>

</body>
</html>
