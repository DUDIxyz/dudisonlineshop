<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DudisAdventure</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f7f9fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #111;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      text-align: center;
    }

    .profile {
      margin-bottom: 40px;
    }

    .profile img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 2px solid #e5e7eb;
    }

    .profile h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .profile p {
      font-size: 14px;
      color: #666;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: block;
      padding: 16px;
      border-radius: 12px;
      background: white;
      text-decoration: none;
      color: #111;
      font-weight: 500;
      border: 1px solid #e5e7eb;

      /* Animation */
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .link-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(34, 197, 94, 0.08); /* hellgrün */
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .link-btn:hover {
      transform: translateY(-3px);
      border-color: #22c55e;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .link-btn:hover::after {
      opacity: 1;
    }

    .link-btn:active {
      transform: scale(0.97);
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="profile">
      <img src="https://via.placeholder.com/100" alt="Profile">
      <h1>DudisAdventure</h1>
      <p>Travel • Fitness • Lifestyle</p>
    </div>

    <div class="links">
      <a href="#" class="link-btn">70% off Proton VPN</a>
      <a href="#" class="link-btn">YouTube</a>
      <a href="#" class="link-btn">Instagram</a>
      <a href="#" class="link-btn">TikTok</a>
    </div>

    <footer>
      © 2026 DudisAdventure
    </footer>

  </div>

</body>
</html>
